enum AssetType {
  IMAGE
  FILE
}

type Asset {
  id: String!
  createdAt: String!
  updatedAt: String!
  name: String!
  source: String!
  type: AssetType!

  products: [Product]!
  collections: [Collection]!
  productVariants: [ProductVariant]
  labelValues: [LabelValues]!
}

type Query {
  asset(id: ID!): Asset
  assets: [Asset]!
}
