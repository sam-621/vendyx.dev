type Collection implements Node {
  id: ID!
  createdAt: Date!
  updatedAt: Date!
  name: String!
  description: String!
  slug: String!
  enabled: Boolean!

  products: [Product]!
  assets: [Asset]!
  labelValues: [LabelValues]!
}

type CollectionList implements List {
  items: [Collection]!
  totalItems: Int!
}

input CreateCollectionInput {
  name: String!
  slug: String!
  description: String
  enabled: Boolean
}
