type Option implements Node {
  id: ID!
  createdAt: Date!
  updatedAt: Date!
  name: String!

  values: [OptionValues]!
}

type OptionValues implements Node {
  id: ID!
  createdAt: Date!
  updatedAt: Date!
  value: String!

  option: Option!
}

input CreateOptionInput {
  name: String!
  values: [String!]!
}
