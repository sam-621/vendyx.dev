type Product implements Node {
  id: ID!
  createdAt: Date!
  updatedAt: Date!
  name: String!
  slug: String!
  description: String
  enabled: Boolean!

  variants: ProductVariantList!
  collections: CollectionList!
  assets: AssetList!
}

type ProductList implements List {
  items: [Product]!
  count: Int!
}

input CreateProductInput {
  name: String!
  slug: String!
  description: String
  enabled: Boolean
}
