type Product implements Node {
  id: ID!
  createdAt: Date!
  updatedAt: Date!
  name: String!
  description: String!
  slug: String!
  enabled: Boolean!

  variants: [ProductVariant]!
  collections: [Collection]!
  assets: [Asset]!
  labelValues: [LabelValues]!
  options: [Option]!
}

type ProductList implements List {
  items: [Product!]!
  totalItems: Int!
}

input CreateProductInput {
  name: String!
  slug: String!
  description: String
  enabled: Boolean

  collectionsIds: [ID!]
  assetsIds: [ID!]
  labelValuesIds: [ID!]
  variants: [CreateProductVariantInput!]
}
