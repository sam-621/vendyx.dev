type Product {
  id: ID!
  createdAt: Date!
  updatedAt: Date!
  name: String!
  description: String!
  slug: String!
  enabled: Boolean!

  variants: [ProductVariant]!
  collections: [Collection]!
  assets: [Asset]!
  labelValues: [LabelValues]!
  options: [Option]!
}

input CreateOptionInVariantInput {
  name: String!
  value: String!
}

input CreateVariantInProductInput {
  price: Int!
  sku: String!
  enabled: Boolean
  stock: Int

  product: ID!
  asset: ID
  optionValues: [CreateOptionInVariantInput!]!
}

input CreateProductInput {
  name: String!
  slug: String!
  description: String
  enabled: Boolean

  collectionsIds: [ID!]
  assetsIds: [ID!]
  labelValuesIds: [ID!]
  variants: [CreateVariantInProductInput!]
}
