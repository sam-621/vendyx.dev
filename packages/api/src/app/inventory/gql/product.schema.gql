type Product implements Node {
  id: ID!
  createdAt: Date!
  updatedAt: Date!
  name: String!
  slug: String!
  description: String
  enable: Boolean!

  variants: [ProductVariantList]!
  categories: [CategoryList]!
  assets: [AssetList]!
}

type ProductList implements List {
  items: [Product]!
  totalItems: Int!
}
