type OptionGroup implements Node {
  id: ID!
  createdAt: Date!
  updatedAt: Date!
  name: String!

  options: OptionList
}

type Option implements Node {
  id: ID!
  createdAt: Date!
  updatedAt: Date!
  value: String!

  optionGroups: OptionGroupList
}

type OptionGroupList implements List {
  items: [OptionGroup]!
  count: Int!
}

type OptionList implements List {
  items: [Option]!
  count: Int!
}

input CreateOptionGroup {
  name: String!
  values: [String!]
}
