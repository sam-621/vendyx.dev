type Option implements Node {
  id: ID!
  createdAt: Date!
  updatedAt: Date!
  name: String!

  values: OptionValueList
}

type OptionValue implements Node {
  id: ID!
  createdAt: Date!
  updatedAt: Date!
  value: String!

  option: Option
}

type OptionList implements List {
  items: [Option]!
  count: Int!
}

type OptionValueList implements List {
  items: [OptionValue]!
  count: Int!
}

input CreateOption {
  name: String!
  values: [String!]
}
