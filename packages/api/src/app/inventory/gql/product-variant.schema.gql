type ProductVariant implements Node {
  id: ID!
  createdAt: Date!
  updatedAt: Date!
  price: Float!
  offerPrice: Float!
  costPerProduct: Float!
  stock: Int!
  sku: String!
  enabled: Boolean!
  weight: Float

  optionValues: [OptionValues]!
  asset: Asset
  product: Product!
}

input CreateOptionValuesInput {
  name: String!
  value: String!
}

input CreateProductVariantInput {
  price: Int!
  sku: String!
  enabled: Boolean
  stock: Int
  offerPrice: Float
  costPerProduct: Float
  weight: Float

  asset: ID
  optionValues: [CreateOptionValuesInput]
}
