type ProductVariant implements Node {
  id: ID!
  createdAt: Date!
  updatedAt: Date!
  sku: String

  """
  The actual price of the product
  """
  price: Float!

  """
  Price for illustrative purposes, usually shown crossed out
  """
  comparisonPrice: Float

  """
  Unit price of the product, used to determinate what the profit margin is
  """
  costPerUnit: Float!
  weight: Float
  stock: Int!
  enabled: Boolean!

  options: OptionList
}

type ProductVariantList implements List {
  items: [ProductVariant]!
  count: Int!
}
