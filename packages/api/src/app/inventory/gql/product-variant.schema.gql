type ProductVariant {
  id: String!
  createdAt: Date!
  updatedAt: Date!
  price: Int!
  stock: Int!
  sku: String!
  enabled: Boolean!

  optionValues: [OptionValues]!
  asset: Asset
  product: Product!
}

type Option {
  id: String!
  createdAt: Date!
  updatedAt: Date!
  name: String!

  values: [OptionValues]!
}

type OptionValues {
  id: String!
  createdAt: Date!
  updatedAt: Date!
  value: String!

  option: Option!
}

input CreateProductVariantInput {
  price: Int!
  sku: String!
  enabled: Boolean!
  stock: Int
}
