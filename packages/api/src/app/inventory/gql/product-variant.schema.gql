type ProductVariant {
  id: String!
  createdAt: Date!
  updatedAt: Date!
  price: Int!
  stock: Int!
  sku: String!
  enabled: Boolean!

  optionValues: [OptionValues]!
  asset: Asset
  product: Product!
}

input CreateProductVariantInput {
  price: Int!
  sku: String!
  enabled: Boolean
  stock: Int

  product: ID!
  asset: ID
  optionValues: [CreateOptionInput!]
}
