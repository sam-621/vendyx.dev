type Product {
  id: ID!
  createdAt: Date!
  updatedAt: Date!
  name: String!
  description: String!
  slug: String!
  enabled: Boolean!

  variants: [ProductVariant]!
  collections: [Collection]!
  assets: [Asset]!
  labelValues: [LabelValues]!
  options: [Option]!
}

type ProductVariant {
  id: String!
  createdAt: Date!
  updatedAt: Date!
  price: Int!
  stock: Int!
  sku: String!
  enabled: Boolean!

  optionValues: [OptionValues]!
  asset: Asset
  product: Product!
}

type Option {
  id: String!
  createdAt: Date!
  updatedAt: Date!
  name: String!

  values: [OptionValues]!
}

type OptionValues {
  id: String!
  createdAt: Date!
  updatedAt: Date!
  value: String!

  option: Option!
}

type Query {
  product(id: ID!): Product
  products: [Product]!
  productVariant(id: ID!): ProductVariant
  productVariants: [ProductVariant]!
  option(id: ID!): Option
  options: [Option]!
}
