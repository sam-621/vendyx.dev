scalar Date
scalar ID

interface Node {
  id: ID!
  createdAt: Date!
  updatedAt: Date!
}

interface List {
  items: [Node]!
  count: Int!
}

input PaginatedListInput {
  """
  Skip the first n results
  """
  skip: Int

  """
  Take n result where the cursor is (skip end position)
  """
  take: Int
}
