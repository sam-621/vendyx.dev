scalar Date
scalar ID

interface Node {
  id: ID!
  createdAt: Date!
  updatedAt: Date!
}

interface List {
  items: [Node]!
  totalItems: Int!
}

input PaginatedListInput {
  """
  Skip the first n results
  """
  skip: Int

  """
  take the first n results
  """
  first: Int

  """
  take the last n results
  """
  last: Int
}
