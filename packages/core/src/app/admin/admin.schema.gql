type Admin {
  id: String!
  createdAt: String!
  updatedAt: String!
  username: String!
  password: String!
}

input CreateAdminInput {
  username: String!
  password: String!
}

input AuthenticateInput {
  username: String!
  password: String!
}

type Mutation {
  createAdmin(input: CreateAdminInput!): Admin
  authenticate(input: AuthenticateInput!): String
}